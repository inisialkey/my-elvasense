name: myelvasense
description: "This is project for Elvasense"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your app.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Use as default SVG image loader, prefer use SVG as image asset
  flutter_svg: ^2.2.1

  # Functional programming thingies
  dartz: ^0.10.1

  # Use as Network Client
  dio: ^5.9.0

  # Use hive to save local data
  hive_ce: ^2.12.0
  hive_ce_flutter: ^2.3.2

  # Use for Dependencies Injection
  get_it: ^8.2.0

  # Use for State Management with BLoC pattern
  flutter_bloc: ^9.1.1

  # Use for custom toast with Status, ex:Loading,Success,Failed
  oktoast: ^3.4.0

  # Use for responsive UI, set default size base on Mock Up
  flutter_screenutil: ^5.9.3

  cached_network_image: ^3.4.1

  # logger
  logger: ^2.6.1

  # Firebase
  firebase_core: ^4.1.0
  firebase_analytics: ^12.0.1
  firebase_crashlytics: ^5.0.1

  # Connectivity
  connectivity_plus: ^6.1.4

  # router
  go_router: ^16.2.1

  # Freezed
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  flutter_native_splash: ^2.4.6

  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  lint: ^2.8.0
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  build_runner: ^2.8.0
  http_mock_adapter: ^0.6.1

  #Temporary using old version because error when generate build_runner
  mockito: ^5.5.1

  # Freezed
  freezed: ^3.2.3
  json_serializable: ^6.11.1

  # hive generator
  hive_ce_generator: ^1.9.5

# TODO: Remove these overrides after packages are updated
dependency_overrides:
  #  intl: ^0.20.2
  analyzer: ^8.1.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
    - assets/images/

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
